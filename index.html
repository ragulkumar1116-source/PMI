<!DOCTYPE html>
<html>
<head>
    <title>Student Image Viewer</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 10px;
        }

        h2 {
            text-align: center;
        }

        #gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        img {
            width: 120px;
            height: 120px;
            margin: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
            object-fit: cover;
        }

        /* Popup */
        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            text-align: center;
        }

        #popup img {
            max-width: 90%;
            max-height: 90%;
            margin-top: 3%;
        }
    </style>
</head>
<body>

<h2>Student Images</h2>

<div id="gallery"></div>

<!-- Popup -->
<div id="popup">
    <img id="popupImg">
</div>
<script>
let start = 89000;
let end = 89100;

let container = document.getElementById("gallery");

for (let i = start; i <= end; i++) {

    let img = document.createElement("img");
    let url = "http://121.200.53.156/hindusthan/MstStudentThumb/" + i + ".png";

    img.src = url;

    img.onload = function () {
        console.log("Loaded:", url);
    };

    img.onerror = function () {
        console.log("Not found:", url);
        this.style.display = "none";
    };

    container.appendChild(img);
}
</script>
</body>
</html>
