<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Viewer</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f5f5f5;
    }

    #gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
    }

    img {
        width: 200px;
        height: 200px;
        margin: 10px;
        object-fit: cover;
        border-radius: 10px;
        background: #ddd;
    }
</style>

</head>
<body>

<h2>Photo Gallery</h2>

<div id="gallery"></div>

<!-- 🔥 Paste links here (NO quotes, NO comma) -->
<pre id="links" style="display:none;">
http://14.139.171.133/CourseRegistration/photo/117011353069.jpg
http://14.139.171.133/CourseRegistration/photo/117011353064.jpg
http://14.139.171.133/CourseRegistration/photo/117011353062.jpg
http://14.139.171.133/CourseRegistration/photo/117011353061.jpg
</pre>

<script>
const raw = document.getElementById("links").innerText;
const gallery = document.getElementById("gallery");

raw.split("\n").forEach(link => {
    link = link.trim();

    if (link !== "") {
        const img = document.createElement("img");

        // ⚡ Try HTTP first
        img.src = link;

        img.onerror = function() {
            this.style.display = "none";
        };

        gallery.appendChild(img);
    }
});
</script>

</body>
</html>
